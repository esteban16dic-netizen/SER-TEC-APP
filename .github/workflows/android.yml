name: Build APK
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # Usamos la versión de Scott que es la más estable para errores de tiempo
        uses: s0t0-p/buildozer-action@master
        with:
          buildozer_version: stable
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SER-TEC-APK
          path: bin/*.apk
