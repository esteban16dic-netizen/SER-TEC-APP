name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: kivy/buildozer-action@v1.2.4
        with:
          buildozer_version: stable
          python_version: 3.12

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SER-TEC-App
          path: bin/*.apk
