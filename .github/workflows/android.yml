name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalando Herramientas de SER-TEC
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer kivy==2.3.0 kivymd==1.2.0 cython

      - name: Creando APK (Paciencia de Técnico)
        run: |
          # El 'yes' es para que acepte las licencias de Android solo
          yes | buildozer -v android debug
