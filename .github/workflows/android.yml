name: Build APK
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalando taller virtual
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer kivy==2.3.0 kivymd==1.2.0 cython

      - name: Compilando APK de SER-TEC
        run: |
          yes | buildozer -v android debug

      - name: Guardar instalador
        uses: actions/upload-artifact@v4
        with:
          name: SER-TEC-Final
          path: bin/*.apk
